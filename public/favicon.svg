<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1C5FAD"/>
      <stop offset="50%"  stop-color="#2F81F7"/>
      <stop offset="100%" stop-color="#A371F7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#logoGrad)"/>

  <!-- Inner subtle highlight -->
  <rect x="1" y="1" width="62" height="31" rx="13" fill="white" fill-opacity="0.06"/>

  <!-- Magnifying glass circle -->
  <circle cx="27" cy="27" r="13" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Plus inside the circle (horizontal) -->
  <line x1="27" y1="21" x2="27" y2="33" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Plus inside the circle (vertical) -->
  <line x1="21" y1="27" x2="33" y2="27" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Search handle -->
  <line x1="36.5" y1="36.5" x2="47" y2="47" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
</svg>